name: Threads Auto Post

on:
  schedule:
    # 朝（JST 7:00〜8:00 / 5投稿）
    - cron: '0 22 * * *'   # JST 7:00
    - cron: '15 22 * * *'  # JST 7:15
    - cron: '30 22 * * *'  # JST 7:30
    - cron: '45 22 * * *'  # JST 7:45
    - cron: '0 23 * * *'   # JST 8:00
    # 昼（JST 12:00〜13:00 / 5投稿）
    - cron: '0 3 * * *'    # JST 12:00
    - cron: '15 3 * * *'   # JST 12:15
    - cron: '30 3 * * *'   # JST 12:30
    - cron: '45 3 * * *'   # JST 12:45
    - cron: '0 4 * * *'    # JST 13:00
    # 夕（JST 17:00〜18:00 / 4投稿）
    - cron: '0 8 * * *'    # JST 17:00
    - cron: '20 8 * * *'   # JST 17:20
    - cron: '40 8 * * *'   # JST 17:40
    - cron: '0 9 * * *'    # JST 18:00
    # 夜（JST 20:30〜21:30 / 7投稿）
    - cron: '30 11 * * *'  # JST 20:30
    - cron: '40 11 * * *'  # JST 20:40
    - cron: '50 11 * * *'  # JST 20:50
    - cron: '0 12 * * *'   # JST 21:00
    - cron: '10 12 * * *'  # JST 21:10
    - cron: '20 12 * * *'  # JST 21:20
    - cron: '30 12 * * *'  # JST 21:30
  workflow_dispatch:  # 手動実行も可能

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - run: python post.py
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
